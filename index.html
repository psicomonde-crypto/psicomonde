<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>psico.monde | Bienestar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">

    <a href="https://wa.me/TU_NUMERO" class="fixed bottom-6 right-6 bg-rose-600 text-white px-6 py-4 rounded-full shadow-2xl z-50 flex items-center gap-3 hover:scale-105 transition-transform font-bold border-2 border-white">
        <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-300 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-rose-100"></span></span>
        ASISTENCIA URGENTE
    </a>

    <nav class="flex justify-between items-center p-6 bg-white border-b sticky top-0 z-40">
        <div class="text-xl font-black tracking-tighter">psico.monde</div>
        <div class="flex gap-4">
            <a href="#sesion" class="bg-slate-900 text-white px-5 py-2 rounded-full text-sm font-bold">Pedir Sesión</a>
        </div>
    </nav>

    <header class="max-w-4xl mx-auto px-6 py-20 text-center">
        <h1 class="text-5xl font-extrabold mb-6 tracking-tight text-slate-900">Tu bienestar mental en el <span class="text-blue-600">mundo digital.</span></h1>
        <p class="text-lg text-slate-600 mb-10">Podcast semanal, contenido diario y acompañamiento profesional.</p>
    </header>

    <main class="max-w-4xl mx-auto px-6 grid md:grid-cols-2 gap-8 pb-24">
        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
            <h2 class="text-xl font-bold mb-4">Último Podcast</h2>
            <div class="aspect-video bg-slate-100 rounded-xl flex items-center justify-center text-slate-400 text-sm italic">
                Carga tu episodio de Spotify aquí
            </div>
        </div>

        <div id="sesion" class="bg-white p-8 rounded-3xl shadow-xl border border-blue-50">
            <h2 class="text-xl font-bold mb-4 text-blue-900">Solicitar Sesión</h2>
            <form class="space-y-4">
                <input type="text" placeholder="Tu nombre" class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <select class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    <option>¿Cómo te sientes hoy?</option>
                    <option>Necesito hablar con alguien</option>
                    <option>Busco terapia preventiva</option>
                </select>
                <button type="button" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg">Enviar</button>
            </form>
        </div>
    </main>
</body>
</html>
