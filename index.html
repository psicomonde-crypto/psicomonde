<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>psico.monde | Salud Mental & Bienestar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: radial-gradient(circle at center, #E9D5FF, #F3E8FF); }
        
        /* Fondo con destellos sutiles */
        .universe-bg {
            background-image: 
                radial-gradient(white, rgba(255,255,255,.3) 1px, transparent 1px),
                radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 1px);
            background-size: 50px 50px, 100px 100px;
            background-position: 0 0, 15px 25px;
            opacity: 0.6;
        }

        /* Reproductor de Spotify simulado */
        .spotify-player {
            background-color: #5B21B6; /* Violeta intenso */
            border-radius: 1rem;
            color: white;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
    </style>
</head>
<body class="text-slate-900 scroll-smooth relative">

    <div class="universe-bg absolute inset-0 z-0 pointer-events-none"></div>
